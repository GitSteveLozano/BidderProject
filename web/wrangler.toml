# Cloudflare Pages / Workers configuration.
# Secrets live in the Cloudflare dashboard (Pages → Settings → Environment
# variables → Encrypt) — never commit them. Required:
#   - ANTHROPIC_API_KEY    : sk-ant-...
#   - SUPABASE_URL         : https://<project>.supabase.co
#   - SUPABASE_ANON_KEY    : eyJ... (public anon key for client-side reads)
#   - SUPABASE_SERVICE_KEY : eyJ... (server-side service-role key for writes)
#
# Local dev: copy .dev.vars.example → .dev.vars and fill in. wrangler reads it.

name = "proservice-bid-intelligence"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Non-secret environment hints. Override per-environment in the dashboard.
[vars]
APP_NAME = "ProService Bid Intelligence"
DEFAULT_MODEL_HAIKU = "claude-haiku-4-5"
DEFAULT_MODEL_SONNET = "claude-sonnet-4-6"
