name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify Cloudflare adapter streaming patch applied
        run: |
          if ! grep -q "new App(manifest, false)" dist/_worker.js/_@astrojs-ssr-adapter.mjs; then
            echo "::error::patch-cf-streaming.mjs did not run — Astro SSR will produce [object Object] on Cloudflare"
            exit 1
          fi
