name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bidintel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bidintel
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d bidintel -f db/schema.sql

      - name: Ruff lint
        run: ruff check .
        continue-on-error: true  # ruff config evolves; don't block PRs initially

      - name: Run tests
        run: pytest -v --tb=short

      - name: Build Docker image
        if: github.event_name == 'push'
        run: docker build -t proservice-bid-intelligence:${{ github.sha }} .
