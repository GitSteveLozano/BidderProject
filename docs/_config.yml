title: ProService Bid Intelligence
description: >-
  Multi-agent AI platform for SMB specialty contractors. 8 agents,
  5 layers, tool-grounded numerics, capacity-aware operating intelligence.

theme: jekyll-theme-minimal

# Generated PDFs ship with the Pages site under /dist/
include:
  - dist

# Plugins available by default on GitHub Pages
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-titles-from-headings
  - jekyll-default-layout

relative_links:
  enabled: true
  collections: true

optional_front_matter:
  remove_originals: true

# Use GitHub-flavored markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
