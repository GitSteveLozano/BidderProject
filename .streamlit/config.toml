# Streamlit runtime config. Cloud reads this from the repo.

[server]
headless = true
# Cloud sets the port; locally Streamlit defaults to 8501.

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#1f77b4"
font = "sans serif"

[client]
toolbarMode = "minimal"
showErrorDetails = true
